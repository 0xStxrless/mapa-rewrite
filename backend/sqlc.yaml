version: "2"
sql:
  - engine: "postgresql"
    schema: "schema.sql"
    queries: "queries/"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_db_tags: true
        emit_pointers_for_null_types: false  # uses pgtype nullables instead of pointers